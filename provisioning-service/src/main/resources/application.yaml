spring:
  application:
    name: Provisioning-Service

  datasource:
    url: jdbc:postgresql://localhost:5432/telco_provisioning_db
    username: postgres
    password: 2003

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8087


#  Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: provisioning-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer


